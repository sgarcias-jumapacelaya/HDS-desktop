name: Build HDS Desktop

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev \
            build-essential pkg-config file desktop-file-utils libfuse2

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - uses: dtolnay/rust-toolchain@stable

      - name: Install JS deps
        run: npm ci || npm install

      - name: Build (deb + appimage)
        run: npm run tauri:build -- --bundles deb,appimage

      - uses: actions/upload-artifact@v4
        with:
          name: hds-desktop-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - uses: dtolnay/rust-toolchain@stable

      - name: Install JS deps
        run: npm ci || npm install

      - name: Build (msi + nsis)
        run: npm run tauri:build -- --bundles msi,nsis

      - uses: actions/upload-artifact@v4
        with:
          name: hds-desktop-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    needs: [linux, windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: artifacts }
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
